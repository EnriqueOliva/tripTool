<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Trip</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Canvas — dark, cool, modern */
      --bg: #0b0b12;
      --bg-grad: radial-gradient(900px 500px at 12% -5%, rgba(139,92,246,.22) 0%, transparent 60%),
                 radial-gradient(900px 520px at 100% 8%, rgba(34,211,238,.16) 0%, transparent 55%),
                 radial-gradient(700px 400px at 50% 120%, rgba(244,114,182,.09) 0%, transparent 60%),
                 #0b0b12;
      --surface:    #141420;
      --surface-2:  #1a1a2a;
      --surface-3:  #212134;
      --border:     #262639;
      --border-2:   #363652;

      /* Text */
      --text:   #f3f3f8;
      --text-2: #a3a3b8;
      --text-3: #6a6a82;

      /* Brand accents */
      --day:            #a78bfa;
      --day-soft:       rgba(167,139,250,.14);
      --day-ring:       rgba(167,139,250,.28);
      --transport:      #22d3ee;
      --transport-soft: rgba(34,211,238,.12);
      --transport-ring: rgba(34,211,238,.26);

      /* Status */
      --idea-bg: rgba(255,255,255,.06); --idea-fg: #a3a3b8;
      --tent-bg: rgba(251,191,36,.14);  --tent-fg: #fbbf24;
      --book-bg: rgba(74,222,128,.13);  --book-fg: #4ade80;

      /* Danger / error */
      --danger:    #fb7185;
      --danger-bg: rgba(251,113,133,.12);

      /* Radii & depth */
      --r-lg: 18px;
      --r-md: 12px;
      --r-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.35);
      --shadow-md: 0 8px 24px rgba(0,0,0,.45), 0 2px 4px rgba(0,0,0,.35);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.55), 0 10px 20px rgba(0,0,0,.4);

      /* Motion */
      --ease: cubic-bezier(.2,.7,.2,1);
    }

    * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { color-scheme: dark; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      background: var(--bg-grad);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection { background: var(--day); color: #fff; }

    /* ───────── Header ───────── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11,11,18,.72);
      backdrop-filter: saturate(140%) blur(14px);
      -webkit-backdrop-filter: saturate(140%) blur(14px);
      border-bottom: 1px solid rgba(38,38,57,.8);
    }
    .topbar-inner {
      max-width: 920px; margin: 0 auto;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand { display: flex; flex-direction: column; min-width: 0; }
    .brand-title {
      font-family: 'Inter', sans-serif;
      font-size: 26px; font-weight: 500; letter-spacing: -0.02em;
      color: var(--text); border: none; background: transparent; outline: none;
      padding: 0; width: 100%; max-width: 420px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .brand-title:focus { color: var(--day); }
    .brand-meta { font-size: 12px; color: var(--text-3); letter-spacing: .01em; margin-top: 2px; }

    .toolbar { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 999px;
      font: 500 13px/1 'Inter', sans-serif;
      cursor: pointer; border: 1px solid transparent;
      transition: transform .15s var(--ease), background .15s, color .15s, border-color .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn[disabled] { opacity: .38; cursor: not-allowed; transform: none; }
    .btn-dark {
      background: linear-gradient(135deg, var(--day) 0%, var(--transport) 100%);
      color: #0b0b12;
      font-weight: 600;
    }
    .btn-dark:hover { box-shadow: 0 0 0 4px var(--day-ring), var(--shadow-md); }
    .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }
    .btn-tiny { padding: 5px 8px; font-size: 12px; border-radius: 8px; background: transparent; color: var(--text-3); border-color: transparent; }
    .btn-tiny:hover { background: var(--surface-2); color: var(--text); transform: none; }
    .btn-tiny.danger:hover { background: var(--danger-bg); color: var(--danger); }

    .status {
      font-size: 12px; color: var(--text-3);
      display: inline-flex; align-items: center; gap: 6px;
      min-width: 78px; padding: 0 4px;
      transition: color .15s;
    }
    .status.saving { color: var(--day); }
    .status.saved  { color: var(--book-fg); }
    .status.err    { color: var(--danger); }

    /* ───────── Timeline ───────── */
    .stage {
      max-width: 880px; margin: 0 auto;
      padding: 56px 24px 120px;
      position: relative;
    }

    .intro {
      margin-bottom: 44px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: var(--text-2);
      font-size: 22px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      padding-left: 76px;
      max-width: 560px;
    }
    .intro .accent {
      background: linear-gradient(90deg, var(--day), var(--transport));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 500;
    }

    .tl {
      position: relative;
    }

    /* The vertical spine */
    .tl::before {
      content: "";
      position: absolute;
      left: 36px; top: -8px; bottom: -8px;
      width: 2px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(167,139,250,.6) 6%,
        rgba(167,139,250,.45) 30%,
        rgba(34,211,238,.4) 70%,
        rgba(34,211,238,.55) 94%,
        transparent 100%
      );
      border-radius: 2px;
    }

    .tl-item {
      position: relative;
      padding: 4px 0 4px 76px;
      margin-bottom: 22px;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity .55s var(--ease), transform .55s var(--ease);
    }
    .tl-item.visible { opacity: 1; transform: translateY(0); }

    /* Node on the spine */
    .tl-node {
      position: absolute;
      left: 24px; top: 22px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--surface);
      display: grid; place-items: center;
      font-size: 12px;
      z-index: 1;
      transition: box-shadow .25s var(--ease), transform .25s var(--ease);
    }
    .tl-item .tl-node {
      border: 2px solid var(--day);
      box-shadow: 0 0 0 6px var(--day-ring);
    }
    .tl-item.has-transport .tl-node {
      border: 2px solid var(--transport);
      box-shadow: 0 0 0 6px var(--transport-ring);
      font-size: 13px;
    }
    .tl-item:hover .tl-node { transform: scale(1.08); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow .25s var(--ease), transform .25s var(--ease), border-color .25s;
    }
    .card:hover { box-shadow: var(--shadow-md); border-color: var(--border-2); }

    .card-head {
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .card-head { background: linear-gradient(180deg, var(--day-soft) 0%, transparent 100%); }
    .tl-item.has-transport .card-head {
      background: linear-gradient(135deg, var(--day-soft) 0%, var(--transport-soft) 100%);
    }

    .date-wrap { position: relative; display: inline-flex; }
    .head-date {
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600; color: var(--text);
      border: none; background: transparent; outline: none;
      padding: 4px 10px; cursor: pointer; border-radius: 8px;
      flex: 0 0 auto;
      transition: background .15s, color .15s;
    }
    .head-date:hover { background: rgba(255,255,255,.06); color: var(--day); }
    .head-date.empty { color: var(--text-3); font-weight: 500; font-style: italic; }
    .head-date-hidden {
      position: absolute; left: 0; top: 0;
      width: 1px; height: 1px;
      opacity: 0; pointer-events: none;
      border: none; padding: 0; margin: 0;
    }

    .head-right {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      padding: 4px 10px; border-radius: 999px;
      border: none; outline: none; cursor: pointer;
      appearance: none; -webkit-appearance: none;
      font-family: inherit;
    }
    .badge-idea      { background: var(--idea-bg); color: var(--idea-fg); }
    .badge-tentative { background: var(--tent-bg); color: var(--tent-fg); }
    .badge-booked    { background: var(--book-bg); color: var(--book-fg); }

    .card-body {
      padding: 16px 18px 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 20px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .field.span2 { grid-column: 1 / -1; }
    .label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .11em;
      color: var(--text-3);
    }
    .inp {
      font: 400 14px/1.5 'Inter', sans-serif;
      color: var(--text);
      border: none;
      border-bottom: 1.5px solid transparent;
      background: transparent;
      outline: none; padding: 3px 0;
      width: 100%; min-width: 0;
      transition: border-color .15s;
    }
    .inp:focus { border-bottom-color: var(--day); }
    .transport .inp:focus { border-bottom-color: var(--transport); }
    .inp::placeholder { color: var(--text-3); }
    textarea.inp { resize: none; min-height: 40px; line-height: 1.55; font-family: inherit; }

    /* ── Transport sub-section ── */
    .transport {
      border-top: 1px dashed var(--border-2);
      background: linear-gradient(180deg, transparent 0%, var(--transport-soft) 100%);
    }
    .transport-head {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 12px 18px 4px;
    }
    .transport-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .14em;
      color: var(--transport);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .transport-label::before {
      content: "";
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--transport);
      box-shadow: 0 0 0 3px var(--transport-ring);
    }
    .transport-remove {
      margin-left: auto;
      font-size: 11px; color: var(--text-3);
      background: transparent; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
      font-family: inherit;
    }
    .transport-remove:hover { color: var(--danger); background: var(--danger-bg); }

    /* Toggle button — shown when transport isn't added yet */
    .transport-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 8px 18px 16px;
      padding: 8px 14px;
      background: transparent;
      border: 1px dashed var(--border-2);
      border-radius: 999px;
      color: var(--text-2);
      font: 500 12px/1 'Inter', sans-serif;
      cursor: pointer;
      transition: all .18s var(--ease);
    }
    .transport-toggle:hover {
      border-color: var(--transport);
      color: var(--transport);
      background: var(--transport-soft);
    }

    /* Transport mode select (styled like badge inside head) */
    .mode-sel {
      font-family: inherit;
      font-size: 13px; font-weight: 500;
      border: 1px solid var(--border-2);
      background: var(--surface-2);
      border-radius: 999px;
      padding: 4px 10px 4px 8px;
      color: var(--text);
      outline: none; cursor: pointer;
    }
    .mode-sel option { background: var(--surface-2); color: var(--text); }
    .mode-sel:focus { border-color: var(--transport); }

    /* ───────── Add row ───────── */
    .add-row {
      display: flex; gap: 10px; padding-left: 76px;
      margin-top: 14px;
    }
    .add-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px dashed var(--border-2);
      color: var(--text-2);
      font: 500 13px/1 'Inter', sans-serif;
      cursor: pointer;
      transition: all .18s var(--ease);
    }
    .add-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .add-btn.day:hover       { border-color: var(--day);       color: var(--day);       background: var(--day-soft); }
    .add-btn.transport:hover { border-color: var(--transport); color: var(--transport); background: var(--transport-soft); }

    /* ───────── Empty ───────── */
    .empty {
      padding: 80px 24px; text-align: center; color: var(--text-3);
      font-family: 'Inter', sans-serif; font-style: italic; font-size: 20px;
    }

    /* ───────── Loader ───────── */
    .loader {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      background-image: var(--bg-grad);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      transition: opacity .45s var(--ease), visibility .45s;
    }
    .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--day);
      box-shadow:
        0 0 0 0 var(--day-ring),
        0 0 40px var(--day-ring);
      animation: loader-pulse 1.3s var(--ease) infinite;
    }
    @keyframes loader-pulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 0 0   var(--day-ring), 0 0 40px var(--day-ring); background: var(--day); }
      50%      { transform: scale(1.6); box-shadow: 0 0 0 14px rgba(167,139,250,0), 0 0 60px var(--transport-ring); background: var(--transport); }
    }
    .loader-text {
      font-size: 13px; font-weight: 500; color: var(--text-2);
      letter-spacing: .02em;
    }

    /* Lock scroll while loader is up */
    body.loading { overflow: hidden; }

    /* ───────── Toast ───────── */
    .toast {
      position: fixed; bottom: 26px; left: 50%;
      transform: translate(-50%, 60px); opacity: 0;
      background: var(--surface-3); color: var(--text);
      border: 1px solid var(--border-2);
      padding: 11px 20px; border-radius: 999px;
      font: 500 13px 'Inter', sans-serif;
      box-shadow: var(--shadow-lg);
      transition: transform .35s var(--ease), opacity .22s;
      z-index: 999; pointer-events: none;
      max-width: calc(100vw - 48px);
    }
    .toast.on  { transform: translate(-50%, 0); opacity: 1; }
    .toast.ok  { border-color: var(--book-fg); color: var(--book-fg); }
    .toast.bad { border-color: var(--danger);  color: var(--danger); }

    /* ───────── Responsive ───────── */
    /* Tablet / narrow desktop — stack header into two rows */
    @media (max-width: 720px) {
      .topbar-inner {
        flex-wrap: wrap;
        align-items: stretch;
        gap: 8px;
        padding: 10px 16px;
      }
      .brand { flex: 1 1 100%; min-width: 0; }
      .toolbar {
        flex: 1 1 100%;
        justify-content: flex-end;
        gap: 6px;
      }
      .status { margin-right: auto; padding-left: 4px; }
      .btn { padding: 8px 14px; font-size: 13px; min-height: 38px; }
    }

    /* Phone */
    @media (max-width: 520px) {
      .stage { padding: 24px 14px 96px; }
      .intro {
        padding-left: 54px;
        font-size: 17px;
        margin-bottom: 32px;
        line-height: 1.4;
      }

      .tl::before { left: 24px; }
      .tl-node    { left: 12px; top: 16px; width: 24px; height: 24px; font-size: 11px; }
      .tl-item    { padding-left: 54px; margin-bottom: 18px; }
      .add-row    { padding-left: 54px; flex-wrap: wrap; gap: 8px; }
      .add-btn    { padding: 10px 14px; font-size: 13px; width: 100%; justify-content: center; }

      .card-head {
        padding: 12px 14px;
        gap: 8px;
      }
      .card-body {
        padding: 14px;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .field.span2 { grid-column: 1; }

      .head-kind { padding: 3px 8px; font-size: 9px; letter-spacing: .12em; }
      .head-date { font-size: 13px; }
      .badge     { padding: 4px 10px; font-size: 10px; }
      .mode-sel  { font-size: 12px; padding: 4px 8px 4px 6px; max-width: 140px; }

      /* On very small screens, let the mode selector wrap to its own line */
      .tl-item.is-transport .mode-sel { flex-basis: 100%; max-width: none; }

      .inp { font-size: 15px; } /* 15px+ avoids iOS zoom-on-focus */

      .btn-tiny { padding: 8px 10px; min-width: 36px; }

      .brand-title { font-size: 20px; }
      .brand-meta  { font-size: 11px; }

      .topbar-inner { padding: 10px 14px; }
    }

    /* Very small phones */
    @media (max-width: 360px) {
      .tl::before { left: 20px; }
      .tl-node    { left: 8px; }
      .tl-item    { padding-left: 48px; }
      .add-row    { padding-left: 48px; }
      .intro      { padding-left: 48px; font-size: 16px; }
    }
  </style>
</head>
<body class="loading">

<div class="loader" id="loader">
  <div class="loader-dot"></div>
  <p class="loader-text">Loading your trip…</p>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <input class="brand-title" id="tripTitle" type="text" value="Our Trip" spellcheck="false" />
      <span class="brand-meta" id="tripMeta"></span>
    </div>
    <div class="toolbar">
      <span class="status" id="statusDot"></span>
      <button class="btn btn-ghost" id="undoBtn" onclick="undo()" disabled>↩ Undo</button>
      <button class="btn btn-ghost" onclick="loadFromSheets()">↓ Load</button>
      <button class="btn btn-dark"  onclick="saveToSheets()">Save now</button>
    </div>
  </div>
</header>

<main class="stage">
  <p class="intro">A <span class="accent">day-by-day</span> chronology — scroll down to move forward in time.</p>

  <div class="tl" id="tl"></div>

  <div class="add-row">
    <button class="add-btn day" onclick="addEntry()">＋ Add entry</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ── Config ───────────────────────────────────────────────────
  const LS       = 'tp_items_v2';
  const LS_TITLE = 'tp_title';
  const BIN_ID   = '69e6843eaaba8821971d19a9';
  const BIN_KEY  = '$2a$10$I4VrBBHY70cCt0j8YaGuNOfCYbsoQx7yxf/tcCtn8dTdR7yNBRVxq';
  const BIN_URL  = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  const SAVE_DEBOUNCE_MS = 10000;

  const MODES = {
    flight: { icon: '✈️', label: 'Flight' },
    train:  { icon: '🚆', label: 'Train'  },
    car:    { icon: '🚗', label: 'Car'    },
    bus:    { icon: '🚌', label: 'Bus'    },
    boat:   { icon: '⛴️', label: 'Boat'   },
    walk:   { icon: '🚶', label: 'Walk'   },
    other:  { icon: '📍', label: 'Other'  },
  };

  // ── State ────────────────────────────────────────────────────
  let items     = [];
  let history   = [];
  let saveTimer = null;
  let dirty     = false;
  let saving    = false;
  let io        = null;

  // ── Boot ─────────────────────────────────────────────────────
  function init() {
    const t = localStorage.getItem(LS_TITLE);
    if (t) document.getElementById('tripTitle').value = t;

    document.getElementById('tripTitle').addEventListener('input', e => {
      localStorage.setItem(LS_TITLE, e.target.value);
      updateMeta();
    });

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    });

    window.addEventListener('beforeunload', e => {
      if (dirty || saving) { e.preventDefault(); e.returnValue = ''; }
    });

    io = new IntersectionObserver(entries => {
      entries.forEach(en => { if (en.isIntersecting) en.target.classList.add('visible'); });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

    load();
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

  function seed() { return [blank()]; }

  function blank() {
    return {
      id: uid(),
      date: '', city: '', activity: '', time: '', notes: '', status: 'idea',
      hasTransport: false,
      mode: 'flight', from: '', to: '',
      departTime: '', arriveTime: '', confirmation: '',
    };
  }

  // ── Local fallback ───────────────────────────────────────────
  function loadLocal() {
    try {
      const s = localStorage.getItem(LS);
      items = s ? JSON.parse(s) : seed();
    } catch { items = seed(); }
    items = items.map(migrate);
    render();
  }

  // Accepts:
  //   - new unified entries (pass through)
  //   - legacy { type:'day', ... }
  //   - legacy { type:'transport', from, to, ... }  → folded into an entry with hasTransport=true
  function migrate(it) {
    const base = {
      id: it.id || uid(),
      date: it.date || '',
      city: it.city || '',
      activity: it.activity || '',
      time: it.time || '',
      notes: it.notes || '',
      status: it.status || 'idea',
      hasTransport: !!it.hasTransport,
      mode: it.mode || 'flight',
      from: it.from || '',
      to: it.to || '',
      departTime: it.departTime || '',
      arriveTime: it.arriveTime || '',
      confirmation: it.confirmation || '',
    };
    if (it.type === 'transport') {
      base.hasTransport = true;
      base.city = base.city || it.to || '';
      base.time = base.time || it.departTime || '';
    }
    return base;
  }

  function saveLocal() { localStorage.setItem(LS, JSON.stringify(items)); }

  // ── Loader overlay ───────────────────────────────────────────
  function hideLoader() {
    document.getElementById('loader').classList.add('hidden');
    document.body.classList.remove('loading');
  }

  // ── Remote ───────────────────────────────────────────────────
  async function load() {
    setState('saving'); setStatusText('↓ loading…');
    try {
      const res  = await fetch(`${BIN_URL}/latest`, { headers: { 'X-Master-Key': BIN_KEY } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const saved = data?.record?.items;
      if (Array.isArray(saved)) {
        items = (saved.length ? saved : seed()).map(migrate);
        history = [];
        document.getElementById('undoBtn').disabled = true;
        dirty = false;
        render();
        setState('idle');
      } else {
        loadLocal();
        setState('idle');
      }
    } catch (e) {
      console.error(e);
      loadLocal();
      setState('err');
      toast('Could not reach server — showing local data', 'bad');
    } finally {
      hideLoader();
    }
  }

  function scheduleSave() {
    dirty = true;
    setState('dirty');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(doSave, SAVE_DEBOUNCE_MS);
  }

  async function doSave() {
    clearTimeout(saveTimer);
    if (saving) return;
    if (!dirty) { setState('saved'); return; }
    saving = true; dirty = false;
    const snapshot = JSON.stringify({ items });
    setState('saving');
    try {
      const res = await fetch(BIN_URL, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
        body:    snapshot,
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data?.record) throw new Error('Unexpected response');
      saving = false;
      if (dirty) scheduleSave();
      else {
        setState('saved');
        setTimeout(() => { if (!dirty && !saving) setState('idle'); }, 3000);
      }
    } catch (e) {
      console.error('save failed:', e);
      saving = false; dirty = true;
      setState('err');
      saveTimer = setTimeout(doSave, SAVE_DEBOUNCE_MS);
      toast('Save failed — will retry', 'bad');
    }
  }

  function saveToSheets() { dirty = true; clearTimeout(saveTimer); doSave(); }

  async function loadFromSheets() {
    if (dirty || saving) {
      if (!confirm('You have unsaved changes. Load will overwrite them. Continue?')) return;
    }
    await load();
  }

  function setState(s) { setStatusClass(s); setStatusText(stateLabel(s)); }
  function stateLabel(s) {
    switch (s) {
      case 'idle':   return '';
      case 'dirty':  return '· unsaved';
      case 'saving': return '↑ saving…';
      case 'saved':  return '✓ saved';
      case 'err':    return '⚠ retrying';
    }
    return '';
  }
  function setStatusClass(s) {
    const el = document.getElementById('statusDot');
    el.className = 'status' + (s === 'idle' ? '' :
                               s === 'dirty' || s === 'saving' ? ' saving' :
                               s === 'saved' ? ' saved' :
                               s === 'err' ? ' err' : '');
  }
  function setStatusText(t) { document.getElementById('statusDot').textContent = t; }

  // ── Render ───────────────────────────────────────────────────
  function render() {
    const tl = document.getElementById('tl');
    tl.innerHTML = '';

    if (!items.length) {
      tl.innerHTML = '<div class="empty">No entries yet. Add a day or a flight below.</div>';
      updateMeta(); return;
    }

    const ordered = sortItems(items);
    ordered.forEach(item => tl.appendChild(renderCard(item)));

    // reveal on scroll
    document.querySelectorAll('.tl-item').forEach(el => io.observe(el));

    saveLocal();
    updateMeta();
  }

  function sortItems(arr) {
    return [...arr].sort((a, b) => {
      const da = a.date || '9999-12-31';
      const db = b.date || '9999-12-31';
      if (da !== db) return da.localeCompare(db);
      const ta = (a.time || a.departTime || '');
      const tb = (b.time || b.departTime || '');
      return ta.localeCompare(tb);
    });
  }

  function renderCard(item) {
    const el = document.createElement('article');
    el.className = 'tl-item' + (item.hasTransport ? ' has-transport' : '');
    const mode = MODES[item.mode] || MODES.other;
    const nodeIcon = item.hasTransport ? mode.icon : '·';

    el.innerHTML = `
      <div class="tl-node">${nodeIcon}</div>
      <div class="card">
        <header class="card-head">
          <span class="date-wrap">
            <button type="button" class="head-date ${item.date ? '' : 'empty'}"
                    onclick="openDate(this)">
              ${item.date ? fmtDate(item.date) : 'Pick date'}
            </button>
            <input class="head-date-hidden" type="date" value="${item.date}"
                   onchange="upd('${item.id}','date',this.value); render()" />
          </span>
          <div class="head-right">
            <select class="badge badge-${item.status}"
                    onchange="updStatus('${item.id}',this)">
              ${statusOptions(item.status)}
            </select>
            <button class="btn btn-tiny danger" title="Remove entry"
                    onclick="removeItem('${item.id}')">✕</button>
          </div>
        </header>

        <div class="card-body">
          <div class="field">
            <label class="label">Location</label>
            <input class="inp" type="text" value="${x(item.city)}"
                   placeholder="e.g. Paris"
                   onchange="upd('${item.id}','city',this.value)" />
          </div>
          <div class="field">
            <label class="label">Time</label>
            <input class="inp" type="text" value="${x(item.time)}"
                   placeholder="e.g. Morning"
                   onchange="upd('${item.id}','time',this.value)" />
          </div>
          <div class="field span2">
            <label class="label">Activity</label>
            <input class="inp" type="text" value="${x(item.activity)}"
                   placeholder="What are you doing?"
                   onchange="upd('${item.id}','activity',this.value)" />
          </div>
          <div class="field span2">
            <label class="label">Notes</label>
            <textarea class="inp" rows="2"
                      placeholder="Links, reservations, things to remember…"
                      onchange="upd('${item.id}','notes',this.value)">${x(item.notes)}</textarea>
          </div>
        </div>

        ${item.hasTransport ? renderTransportSection(item) : `
          <button class="transport-toggle" onclick="enableTransport('${item.id}')">
            ＋ Add transport details
          </button>
        `}
      </div>`;
    return el;
  }

  function renderTransportSection(item) {
    return `
      <div class="transport">
        <div class="transport-head">
          <span class="transport-label">Transport</span>
          <select class="mode-sel" onchange="upd('${item.id}','mode',this.value); render()">
            ${Object.entries(MODES).map(([k,v]) =>
              `<option value="${k}" ${item.mode===k?'selected':''}>${v.icon}  ${v.label}</option>`
            ).join('')}
          </select>
          <button class="transport-remove" onclick="disableTransport('${item.id}')">Remove</button>
        </div>
        <div class="card-body">
          <div class="field">
            <label class="label">From</label>
            <input class="inp" type="text" value="${x(item.from)}"
                   placeholder="e.g. Montevideo (MVD)"
                   onchange="upd('${item.id}','from',this.value)" />
          </div>
          <div class="field">
            <label class="label">To</label>
            <input class="inp" type="text" value="${x(item.to)}"
                   placeholder="e.g. Paris (CDG)"
                   onchange="upd('${item.id}','to',this.value)" />
          </div>
          <div class="field">
            <label class="label">Departure</label>
            <input class="inp" type="time" value="${x(item.departTime)}"
                   onchange="upd('${item.id}','departTime',this.value)" />
          </div>
          <div class="field">
            <label class="label">Arrival</label>
            <input class="inp" type="time" value="${x(item.arriveTime)}"
                   onchange="upd('${item.id}','arriveTime',this.value)" />
          </div>
          <div class="field span2">
            <label class="label">Reference / confirmation</label>
            <input class="inp" type="text" value="${x(item.confirmation)}"
                   placeholder="e.g. AF1234 · booking code ABC123"
                   onchange="upd('${item.id}','confirmation',this.value)" />
          </div>
        </div>
      </div>`;
  }

  function statusOptions(current) {
    return ['idea','tentative','booked'].map(s => {
      const label = s === 'booked' ? 'Booked ✓' : s[0].toUpperCase() + s.slice(1);
      return `<option value="${s}" ${current===s?'selected':''}>${label}</option>`;
    }).join('');
  }

  function x(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Meta (date range in header) ──────────────────────────────
  function updateMeta() {
    const dates = items.map(i => i.date).filter(Boolean).sort();
    const n = items.length;
    const part = n ? `${n} entr${n !== 1 ? 'ies' : 'y'}` : '';
    const meta = document.getElementById('tripMeta');
    if (dates.length >= 2) meta.textContent = `${fmtDate(dates[0])} → ${fmtDate(dates[dates.length-1])} · ${part}`;
    else if (dates.length === 1) meta.textContent = `${fmtDate(dates[0])} · ${part}`;
    else meta.textContent = part;
  }
  // "15/may/2026" — day/lowercase month name/year
  function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s + 'T12:00:00');
    const day   = d.getDate();
    const month = d.toLocaleDateString('en-US', { month: 'long' }).toLowerCase();
    const year  = d.getFullYear();
    return `${day}/${month}/${year}`;
  }

  function openDate(btn) {
    const input = btn.nextElementSibling;
    if (input && typeof input.showPicker === 'function') {
      try { input.showPicker(); return; } catch {}
    }
    if (input) { input.focus(); input.click(); }
  }

  // ── History / Undo ───────────────────────────────────────────
  function pushHistory() {
    history.push(JSON.stringify(items));
    if (history.length > 50) history.shift();
    document.getElementById('undoBtn').disabled = false;
  }
  function undo() {
    if (!history.length) return;
    items = JSON.parse(history.pop());
    document.getElementById('undoBtn').disabled = history.length === 0;
    render(); scheduleSave();
    toast('Undone', '');
  }

  // ── Data ops ─────────────────────────────────────────────────
  function upd(id, field, val) {
    pushHistory();
    items = items.map(i => i.id === id ? { ...i, [field]: val } : i);
    saveLocal(); updateMeta(); scheduleSave();
  }
  function updStatus(id, sel) {
    sel.className = `badge badge-${sel.value}`;
    upd(id, 'status', sel.value);
  }
  function addEntry() {
    pushHistory();
    const entry = blank();
    entry.date = lastDate();
    items.push(entry);
    render(); scheduleSave();
    scrollToLast();
  }
  function removeItem(id) {
    pushHistory();
    items = items.filter(i => i.id !== id);
    render(); scheduleSave();
  }
  function enableTransport(id) {
    pushHistory();
    items = items.map(i => i.id === id ? { ...i, hasTransport: true } : i);
    render(); scheduleSave();
  }
  function disableTransport(id) {
    pushHistory();
    items = items.map(i => i.id === id
      ? { ...i, hasTransport: false, from: '', to: '', departTime: '', arriveTime: '', confirmation: '' }
      : i);
    render(); scheduleSave();
  }

  function lastDate() {
    const dates = items.map(i => i.date).filter(Boolean).sort();
    return dates[dates.length - 1] || '';
  }
  function scrollToLast() {
    setTimeout(() => {
      const cards = document.querySelectorAll('.tl-item');
      if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 80);
  }

  // ── Toast ─────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, cls = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast on' + (cls ? ' ' + cls : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
  }

  init();
</script>
</body>
</html>
