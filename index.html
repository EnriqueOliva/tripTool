<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Trip</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <style>
    :root {
      /* Canvas */
      --bg: #0b0b12;
      --bg-grad: radial-gradient(70vw 50vh at 0% 0%,   rgba(139,92,246,.14) 0%, transparent 70%),
                 radial-gradient(70vw 55vh at 100% 0%, rgba(34,211,238,.10) 0%, transparent 70%),
                 radial-gradient(60vw 45vh at 100% 100%, rgba(244,114,182,.07) 0%, transparent 70%);
      --surface:   #141420;
      --surface-2: #1a1a2a;
      --surface-3: #212134;
      --border:    #262639;
      --border-2:  #363652;

      /* Text */
      --text:   #f3f3f8;
      --text-2: #a5a5bc;
      --text-3: #6a6a82;

      /* Card types */
      --activity:      #a78bfa;   /* violet */
      --activity-soft: rgba(167,139,250,.14);
      --activity-ring: rgba(167,139,250,.28);
      --transport:     #22d3ee;   /* cyan */
      --transport-soft:rgba(34,211,238,.12);
      --transport-ring:rgba(34,211,238,.26);
      --hotel:         #f472b6;   /* pink */
      --hotel-soft:    rgba(244,114,182,.13);
      --hotel-ring:    rgba(244,114,182,.28);

      /* Status */
      --idea-bg: rgba(255,255,255,.06); --idea-fg: #a5a5bc;
      --tent-bg: rgba(251,191,36,.14);  --tent-fg: #fbbf24;
      --book-bg: rgba(74,222,128,.13);  --book-fg: #4ade80;

      --danger:    #fb7185;
      --danger-bg: rgba(251,113,133,.12);

      --r-lg: 18px;
      --r-md: 12px;
      --r-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.35);
      --shadow-md: 0 8px 24px rgba(0,0,0,.45), 0 2px 4px rgba(0,0,0,.35);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.55), 0 10px 20px rgba(0,0,0,.4);
      --ease: cubic-bezier(.2,.7,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      font-size: 17px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      min-height: 100vh;
    }
    /* Atmospheric gradient — fixed to viewport so it never tiles/repeats */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: var(--bg-grad);
      pointer-events: none;
    }
    body.loading { overflow: hidden; }
    ::selection { background: var(--activity); color: #0b0b12; }

    /* ───────── Topbar ───────── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11,11,18,.72);
      backdrop-filter: saturate(140%) blur(14px);
      -webkit-backdrop-filter: saturate(140%) blur(14px);
      border-bottom: 1px solid rgba(38,38,57,.8);
    }
    .topbar-inner {
      max-width: 960px; margin: 0 auto;
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand { display: flex; flex-direction: column; min-width: 0; }
    .brand-title {
      font-family: inherit;
      font-size: 34px; font-weight: 700; letter-spacing: -0.025em;
      color: var(--text); border: none; background: transparent; outline: none;
      padding: 0; width: 100%; max-width: 480px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .brand-title:focus { color: var(--activity); }
    .brand-meta { font-size: 14px; color: var(--text-3); letter-spacing: .01em; margin-top: 2px; }

    .toolbar { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* ───────── Buttons ───────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border-radius: 999px;
      font: 600 15px/1 'Inter', sans-serif;
      cursor: pointer; border: 1px solid transparent;
      transition: transform .15s var(--ease), background .15s, color .15s, border-color .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn[disabled] { opacity: .38; cursor: not-allowed; transform: none; }
    .btn-dark {
      background: linear-gradient(135deg, var(--activity) 0%, var(--transport) 100%);
      color: #0b0b12;
    }
    .btn-dark:hover { box-shadow: 0 0 0 4px var(--activity-ring), var(--shadow-md); }
    .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }
    .btn-tiny {
      padding: 7px 11px; font-size: 14px; border-radius: 8px;
      background: transparent; color: var(--text-3); border-color: transparent;
    }
    .btn-tiny:hover { background: var(--surface-2); color: var(--text); transform: none; }
    .btn-tiny.danger:hover { background: var(--danger-bg); color: var(--danger); }

    .status {
      font-size: 14px; color: var(--text-3);
      display: inline-flex; align-items: center; gap: 6px;
      min-width: 86px; padding: 0 4px;
      transition: color .15s;
    }
    .status.saving { color: var(--activity); }
    .status.saved  { color: var(--book-fg); }
    .status.err    { color: var(--danger); }

    /* ───────── Trip range picker ───────── */
    .range-bar {
      max-width: 960px; margin: 0 auto;
      padding: 32px 24px 0;
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap;
    }
    .range-label {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .14em;
      color: var(--text-3);
    }
    .range-picker {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 999px;
      padding: 6px 10px;
    }
    .range-date-wrap { position: relative; display: inline-flex; }
    .range-date {
      font: 600 16px/1 'Inter', sans-serif;
      color: var(--text);
      background: transparent; border: none; outline: none;
      padding: 8px 14px; border-radius: 999px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .range-date:hover { background: var(--surface-2); color: var(--activity); }
    .range-date.empty { color: var(--text-3); font-weight: 500; font-style: italic; }
    .range-arrow { color: var(--text-3); font-size: 16px; }
    .range-date-hidden,
    .head-date-hidden {
      position: absolute; left: 0; top: 0;
      width: 1px; height: 1px;
      opacity: 0; pointer-events: none;
      border: none; padding: 0; margin: 0;
    }

    /* ───────── Main stage ───────── */
    .stage { max-width: 960px; margin: 0 auto; padding: 28px 24px 140px; }

    .trip-description {
      display: block;
      width: 100%;
      max-width: 680px;
      margin-bottom: 40px;
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      overflow: hidden;
      font-family: inherit;
      font-weight: 400;
      font-size: 19px;
      line-height: 1.55;
      color: var(--text-2);
      padding: 8px 10px;
      margin-left: -10px;
      border-radius: 10px;
      transition: background .15s, color .15s;
    }
    .trip-description:hover { background: rgba(255,255,255,.02); }
    .trip-description:focus { color: var(--text); background: rgba(255,255,255,.03); }
    .trip-description::placeholder { color: var(--text-3); font-style: italic; }

    /* ───────── Day blocks ───────── */
    .days { display: flex; flex-direction: column; gap: 42px; position: relative; }

    /* A faint spine connecting all day headers */
    .days::before {
      content: "";
      position: absolute;
      left: 21px; top: 18px; bottom: 18px;
      width: 2px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(167,139,250,.45) 6%,
        rgba(34,211,238,.35) 94%,
        transparent 100%
      );
      border-radius: 2px;
      pointer-events: none;
    }

    .day-block {
      position: relative;
      padding-left: 56px; /* space for spine + dot, before the header card */
      opacity: 0; transform: translateY(14px);
      transition: opacity .35s var(--ease), transform .35s var(--ease);
    }
    .day-block.visible { opacity: 1; transform: translateY(0); }

    /* Day header (card) — sits inside the day-block's indented content area */
    .day-header {
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      flex-wrap: wrap;
    }
    .day-header-main { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

    /* Dot sits on the spine, clearly to the LEFT of the header card */
    .day-dot {
      position: absolute;
      left: 10px; top: 22px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--activity);
      box-shadow: 0 0 0 5px var(--activity-ring);
    }
    .day-num {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .18em;
      color: var(--text-3);
    }
    .day-title {
      font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
      color: var(--text);
    }
    .day-weekday {
      font-size: 14px; font-weight: 600; color: var(--activity);
      margin-right: 8px;
    }
    .day-count {
      font-size: 13px; color: var(--text-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 5px 11px; border-radius: 999px;
      flex-shrink: 0;
    }

    /* Cards within a day */
    .day-cards {
      display: flex; flex-direction: column; gap: 10px;
      padding: 14px 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow .25s var(--ease), border-color .25s;
    }
    .card:hover { box-shadow: var(--shadow-md); border-color: var(--border-2); }

    .card-head {
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .drag-handle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      color: var(--text-3);
      cursor: grab;
      user-select: none;
      border-radius: 6px;
      transition: background .15s, color .15s;
      flex-shrink: 0;
      font-size: 16px; line-height: 1;
    }
    .drag-handle:hover  { background: var(--surface-2); color: var(--text-2); }
    .drag-handle:active { cursor: grabbing; }

    /* Sortable drag states */
    .card-ghost {
      opacity: 0.35;
      background: var(--surface-2) !important;
    }
    .card-chosen {
      box-shadow: var(--shadow-lg) !important;
    }
    .card-drag {
      opacity: 0.95;
      cursor: grabbing;
    }
    .card.type-activity  .card-head { background: linear-gradient(180deg, var(--activity-soft)  0%, transparent 100%); }
    .card.type-transport .card-head { background: linear-gradient(180deg, var(--transport-soft) 0%, transparent 100%); }
    .card.type-hotel     .card-head { background: linear-gradient(180deg, var(--hotel-soft)     0%, transparent 100%); }

    .type-pill {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .12em;
      padding: 5px 11px; border-radius: 999px;
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
    }
    .card.type-activity  .type-pill { color: var(--activity); }
    .card.type-transport .type-pill { color: var(--transport); }
    .card.type-hotel     .type-pill { color: var(--hotel); }

    .head-right {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      padding: 5px 12px; border-radius: 999px;
      border: none; outline: none; cursor: pointer;
      appearance: none; -webkit-appearance: none;
      font-family: inherit;
    }
    .badge-idea      { background: var(--idea-bg); color: var(--idea-fg); }
    .badge-tentative { background: var(--tent-bg); color: var(--tent-fg); }
    .badge-booked    { background: var(--book-bg); color: var(--book-fg); }

    .mode-sel {
      font-family: inherit;
      font-size: 14px; font-weight: 500;
      border: 1px solid var(--border-2);
      background: var(--surface-2);
      border-radius: 999px;
      padding: 5px 12px 5px 10px;
      color: var(--text);
      outline: none; cursor: pointer;
    }
    .mode-sel option { background: var(--surface-2); color: var(--text); }
    .mode-sel:focus { border-color: var(--transport); }

    .card-body {
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 22px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .field.span2 { grid-column: 1 / -1; }
    .label {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .11em;
      color: var(--text-3);
    }
    .inp {
      font: 400 17px/1.5 'Inter', sans-serif;
      color: var(--text);
      border: none;
      border-bottom: 1.5px solid transparent;
      background: transparent;
      outline: none; padding: 4px 0;
      width: 100%; min-width: 0;
    }

    /* Input with a clear-button suffix */
    .inp-row { display: flex; align-items: center; gap: 8px; }
    .inp-row .inp { flex: 1; }
    .inp-clear {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-3);
      cursor: pointer;
      font: 500 16px/1 'Inter', sans-serif;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .15s var(--ease);
    }
    .inp-clear:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: var(--danger-bg);
    }

    .inline-add-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 14px;
      background: transparent;
      border: 1px dashed var(--border-2);
      border-radius: 999px;
      color: var(--text-3);
      font: 500 14px/1 'Inter', sans-serif;
      cursor: pointer;
      align-self: flex-start;
      transition: all .15s var(--ease);
    }

    /* Date-picker button styled to match the .inp text inputs */
    .inp-date-btn {
      font: 400 17px/1.5 'Inter', sans-serif;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1.5px solid transparent;
      outline: none;
      padding: 4px 0;
      width: 100%;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: border-bottom-color .15s, color .15s;
    }
    .inp-date-btn:hover { border-bottom-color: var(--border-2); }
    .inp-date-btn.empty { color: var(--text-3); font-style: italic; font-weight: 500; }
    .card.type-hotel     .inp-date-btn:focus { border-bottom-color: var(--hotel); }
    .card.type-activity  .inp-date-btn:focus { border-bottom-color: var(--activity); }
    .card.type-transport .inp-date-btn:focus { border-bottom-color: var(--transport); }
    .inline-add-btn:hover {
      border-color: var(--activity);
      color: var(--activity);
      background: var(--activity-soft);
    }
    .card.type-activity  .inp:focus { border-bottom-color: var(--activity); }
    .card.type-transport .inp:focus { border-bottom-color: var(--transport); }
    .card.type-hotel     .inp:focus { border-bottom-color: var(--hotel); }
    .inp::placeholder { color: var(--text-3); }
    textarea.inp { resize: none; min-height: 44px; line-height: 1.55; font-family: inherit; }

    /* ───────── Copy button ───────── */
    .inp-copy {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 7px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-3);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .15s var(--ease);
      padding: 0;
    }
    .inp-copy svg { width: 14px; height: 14px; display: block; }
    .inp-copy:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }
    .inp-copy.copied { color: var(--book-fg); border-color: var(--book-fg); background: rgba(74,222,128,.08); }
    /* Hide copy button when the adjacent input is empty */
    .inp-row .inp:placeholder-shown ~ .inp-copy,
    .ta-wrap .inp:placeholder-shown ~ .inp-copy { opacity: 0; pointer-events: none; }
    .inp-copy.copied svg { animation: copy-bounce .35s var(--ease); }
    @keyframes copy-bounce {
      0%   { transform: scale(1);  }
      50%  { transform: scale(1.3); }
      100% { transform: scale(1);  }
    }

    /* Textarea wrapper — copy button in top-right corner */
    .ta-wrap { position: relative; }
    .ta-wrap .inp-copy {
      position: absolute; top: 6px; right: 6px;
      background: var(--surface);
    }

    /* ───────── Big add buttons ───────── */
    .day-adds-label {
      margin-top: 18px; margin-bottom: 8px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .16em;
      color: var(--text-3);
      display: flex; align-items: center; gap: 10px;
    }
    .day-adds-label::after {
      content: ""; flex: 1; height: 1px;
      background: var(--border);
    }
    .day-adds {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .day-add {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 18px 14px;
      background: var(--surface);
      border: 1px dashed var(--border-2);
      border-radius: var(--r-lg);
      color: var(--text-2);
      font: 600 15px/1.1 'Inter', sans-serif;
      cursor: pointer;
      transition: all .2s var(--ease);
      text-align: center;
    }
    .day-add .add-ico {
      font-size: 26px; line-height: 1;
      transition: transform .25s var(--ease);
    }
    .day-add:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .day-add:hover .add-ico { transform: scale(1.15); }

    .day-add.activity:hover  { border-color: var(--activity);  color: var(--activity);  background: var(--activity-soft); }
    .day-add.transport:hover { border-color: var(--transport); color: var(--transport); background: var(--transport-soft); }
    .day-add.hotel:hover     { border-color: var(--hotel);     color: var(--hotel);     background: var(--hotel-soft); }

    /* Unscheduled / out-of-range cards */
    .unscheduled {
      margin-top: 56px;
      padding: 20px;
      background: rgba(255,255,255,.02);
      border: 1px dashed var(--border);
      border-radius: var(--r-lg);
    }
    .unscheduled-title {
      font-size: 14px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .14em;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    /* ───────── Empty state ───────── */
    .empty {
      padding: 80px 24px; text-align: center; color: var(--text-3);
      font-style: italic; font-size: 22px;
    }

    /* ───────── Unsaved warning strip ───────── */
    .unsaved-strip {
      display: none;
      align-items: center; justify-content: center; gap: 10px;
      background: rgba(251,113,133,.10);
      border-top: 1px solid rgba(251,113,133,.35);
      padding: 8px 20px;
      color: var(--danger);
      font-size: 13px; font-weight: 600;
      letter-spacing: .02em;
    }
    .unsaved-strip.show { display: flex; }
    .unsaved-strip.err  { background: rgba(251,113,133,.14); }
    .unsaved-icon {
      font-size: 14px; line-height: 1;
    }
    .unsaved-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor;
      animation: dirty-pulse 1.6s var(--ease) infinite;
    }
    @keyframes dirty-pulse {
      0%, 100% { opacity: 1;   box-shadow: 0 0 0 0 rgba(251,113,133,.45); }
      60%      { opacity: .55; box-shadow: 0 0 0 7px rgba(251,113,133,0); }
    }

    /* ───────── Save confirmation (big center checkmark) ───────── */
    .save-confirm {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      pointer-events: none;
      z-index: 300;
      opacity: 0;
    }
    .save-confirm.on { animation: save-confirm-anim 1.4s var(--ease) forwards; }
    .save-confirm-box {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(74,222,128,.18), rgba(74,222,128,.06));
      border: 2px solid var(--book-fg);
      display: grid; place-items: center;
      color: var(--book-fg);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 80px rgba(74,222,128,.35), 0 20px 70px rgba(0,0,0,.55);
    }
    .save-confirm-box svg { animation: check-draw .6s .15s var(--ease) both; }
    @keyframes save-confirm-anim {
      0%   { opacity: 0; transform: scale(.55); }
      18%  { opacity: 1; transform: scale(1.08); }
      28%  { transform: scale(1); }
      72%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.18); }
    }
    @keyframes check-draw {
      from { stroke-dashoffset: 30; opacity: 0; }
      to   { stroke-dashoffset: 0;  opacity: 1; }
    }

    /* ───────── Loader ───────── */
    .loader {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      background-image: var(--bg-grad);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      transition: opacity .25s var(--ease), visibility .25s;
    }
    .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--activity);
      animation: loader-pulse 1.3s var(--ease) infinite;
    }
    @keyframes loader-pulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 0 0   var(--activity-ring), 0 0 40px var(--activity-ring); background: var(--activity); }
      50%      { transform: scale(1.6); box-shadow: 0 0 0 14px rgba(167,139,250,0), 0 0 60px var(--transport-ring); background: var(--transport); }
    }
    .loader-text { font-size: 15px; font-weight: 500; color: var(--text-2); letter-spacing: .02em; }
    .loader-sub  { font-size: 13px; color: var(--text-3); margin-top: -12px; opacity: 0; transition: opacity .4s; }
    .loader-sub.show { opacity: 1; }

    /* ───────── Toast ───────── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translate(-50%, 60px); opacity: 0;
      background: var(--surface-3); color: var(--text);
      border: 1px solid var(--border-2);
      padding: 13px 24px; border-radius: 999px;
      font: 500 15px 'Inter', sans-serif;
      box-shadow: var(--shadow-lg);
      transition: transform .35s var(--ease), opacity .22s;
      z-index: 999; pointer-events: none;
      max-width: calc(100vw - 48px);
    }
    .toast.on  { transform: translate(-50%, 0); opacity: 1; }
    .toast.ok  { border-color: var(--book-fg); color: var(--book-fg); }
    .toast.bad { border-color: var(--danger);  color: var(--danger); }

    /* ───────── Responsive ───────── */
    @media (max-width: 780px) {
      .topbar-inner { flex-wrap: wrap; gap: 8px; padding: 10px 14px; }
      .brand { flex: 1 1 100%; min-width: 0; }
      .toolbar { flex: 1 1 100%; justify-content: flex-end; gap: 6px; }
      .status { margin-right: auto; padding-left: 4px; }
      .btn { padding: 7px 13px; font-size: 13px; min-height: 34px; }
      .range-bar { padding: 16px 14px 0; gap: 8px; }
    }

    @media (max-width: 560px) {
      .stage { padding: 14px 14px 100px; }
      .trip-description {
        font-size: 16px; margin-bottom: 18px;
        margin-left: 0; padding: 6px 8px;
        line-height: 1.45;
      }

      .brand-title { font-size: 22px; letter-spacing: -0.02em; max-width: 100%; }
      .brand-meta  { font-size: 12px; margin-top: 1px; }

      .days { gap: 22px; }
      .days::before { left: 17px; top: -4px; bottom: -4px; }
      .day-block { padding-left: 44px; }
      .day-header {
        padding: 10px 12px;
        flex-wrap: wrap;
        gap: 6px;
      }
      .day-dot { left: 8px; top: 15px; width: 20px; height: 20px; box-shadow: 0 0 0 4px var(--activity-ring); }
      .day-header-main { min-width: 0; flex: 1; gap: 2px; }
      .day-title { font-size: 17px; letter-spacing: -0.01em; line-height: 1.2; }
      .day-weekday { font-size: 13px; margin-right: 4px; }
      .day-num { font-size: 10px; letter-spacing: .15em; }
      .day-count { font-size: 11px; padding: 3px 9px; flex-shrink: 0; }

      .day-cards { padding: 10px 0; gap: 10px; }
      .day-adds-label { font-size: 10px; margin-top: 8px; margin-bottom: 6px; }
      .day-adds {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .day-add {
        padding: 11px 14px;
        flex-direction: row; justify-content: flex-start;
        gap: 10px; font-size: 14px;
      }
      .day-add .add-ico { font-size: 20px; }

      .card-head { padding: 10px 12px; gap: 7px; }
      .card-body {
        padding: 12px;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .field.span2 { grid-column: 1; }

      .type-pill { font-size: 10px; padding: 3px 9px; letter-spacing: .1em; }
      .badge     { font-size: 10px; padding: 3px 9px; }
      /* Mode selector moves to its own row on narrow screens */
      .mode-sel  {
        font-size: 12px; padding: 4px 10px 4px 8px;
        flex: 1 1 100%;
        order: 10; /* after head-right so it wraps below row 1 */
      }
      .drag-handle { width: 28px; height: 28px; font-size: 16px; }
      .inp       { font-size: 16px; } /* ≥16px prevents iOS zoom */
      .label     { font-size: 11px; }
      .inp-copy  { width: 30px; height: 30px; }
      .inp-copy svg { width: 14px; height: 14px; }
      .ta-wrap .inp-copy { top: 4px; right: 4px; }
      .btn-tiny  { padding: 6px 8px; font-size: 13px; }

      .range-bar   { padding: 12px 14px 0; align-items: center; }
      .range-picker { padding: 4px 6px; gap: 2px; flex-wrap: wrap; }
      .range-date   { font-size: 14px; padding: 6px 10px; }
      .range-label  { font-size: 11px; }
      .range-arrow  { font-size: 13px; }

      .unscheduled { padding: 14px; margin-top: 22px; }
      .unscheduled-title { font-size: 11px; margin-bottom: 8px; }

      /* Loader */
      .loader-text { font-size: 14px; padding: 0 24px; text-align: center; }
      .loader-sub  { font-size: 12px; padding: 0 24px; text-align: center; }

      /* Save confirm */
      .save-confirm-box { width: 100px; height: 100px; }
      .save-confirm-box svg { width: 48px; height: 48px; }

      /* Unsaved strip */
      .unsaved-strip { padding: 7px 14px; font-size: 12px; gap: 7px; }
    }

    @media (max-width: 400px) {
      .stage { padding: 12px 12px 100px; }
      .days::before { left: 14px; }
      .day-block { padding-left: 38px; }
      .day-header { padding: 10px 10px; }
      .day-dot { left: 6px; top: 14px; width: 18px; height: 18px; box-shadow: 0 0 0 4px var(--activity-ring); }
      .day-title { font-size: 16px; }
      .brand-title { font-size: 20px; }
      .card-head   { padding: 9px 11px; gap: 6px; }
      .card-body   { padding: 11px; gap: 11px; }
      .type-pill   { font-size: 9px; padding: 3px 7px; letter-spacing: .08em; }
    }
  </style>
</head>
<body class="loading">

<div class="loader" id="loader">
  <div class="loader-dot"></div>
  <p class="loader-text">Loading your trip…</p>
  <p class="loader-sub" id="loaderSub">Server is waking up — just a moment</p>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <input class="brand-title" id="tripTitle" type="text" value="Our Trip" spellcheck="false" />
      <span class="brand-meta" id="tripMeta"></span>
    </div>
    <div class="toolbar">
      <span class="status" id="statusDot"></span>
      <button class="btn btn-ghost" id="undoBtn" onclick="undo()" disabled>↩ Undo</button>
      <button class="btn btn-dark"  onclick="saveToSheets()">Save now</button>
    </div>
  </div>
  <div class="unsaved-strip" id="unsavedStrip">
    <span class="unsaved-icon">⚠</span>
    <span class="unsaved-dot"></span>
    <span class="unsaved-text">Unsaved changes</span>
  </div>
</header>

<div class="save-confirm" id="saveConfirm">
  <div class="save-confirm-box">
    <svg width="68" height="68" viewBox="0 0 24 24" fill="none">
      <path d="M5 12.5l4.5 4.5L19 7"
            stroke="currentColor" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            pathLength="30" stroke-dasharray="30" />
    </svg>
  </div>
</div>

<div class="range-bar">
  <span class="range-label">Trip</span>
  <div class="range-picker">
    <span class="range-date-wrap">
      <button type="button" class="range-date" id="startBtn" onclick="openDate(this)">—</button>
      <input class="range-date-hidden" id="startInput" type="date"
             onchange="setRange('startDate', this.value)" />
    </span>
    <span class="range-arrow">→</span>
    <span class="range-date-wrap">
      <button type="button" class="range-date" id="endBtn" onclick="openDate(this)">—</button>
      <input class="range-date-hidden" id="endInput" type="date"
             onchange="setRange('endDate', this.value)" />
    </span>
  </div>
</div>

<main class="stage">
  <textarea class="trip-description" id="tripDescription" rows="1"
            placeholder="Write an intro for this trip — who, where, why, anything you want to remember…"></textarea>

  <div class="days" id="days"></div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ── Config ───────────────────────────────────────────────────
  const LS           = 'tp_state_v3';
  const FIREBASE_URL = 'https://triptool-64f1f-default-rtdb.firebaseio.com';
  const DATA_PATH    = '/trip.json';
  const REMOTE_URL   = FIREBASE_URL + DATA_PATH;
  const SAVE_DEBOUNCE_MS  = 10000;
  const LOAD_SLOW_HINT_MS = 2500;

  const MODES = {
    flight: { icon: '✈️', label: 'Flight' },
    train:  { icon: '🚆', label: 'Train'  },
    car:    { icon: '🚗', label: 'Car'    },
    bus:    { icon: '🚌', label: 'Bus'    },
    boat:   { icon: '⛴️', label: 'Boat'   },
    walk:   { icon: '🚶', label: 'Walk'   },
    other:  { icon: '📍', label: 'Other'  },
  };

  const TYPES = {
    activity:  { icon: '☀️', label: 'Activity',  accent: 'activity'  },
    transport: { icon: '✈️', label: 'Transport', accent: 'transport' },
    hotel:     { icon: '🏨', label: 'Hotel',     accent: 'hotel'     },
  };

  // ── State ────────────────────────────────────────────────────
  let state = {
    title: 'Our Trip',
    description: '',
    startDate: '',
    endDate: '',
    cards: [],
  };
  let history   = [];
  let saveTimer = null;
  let dirty     = false;
  let saving    = false;
  let io        = null;

  // ── Boot ─────────────────────────────────────────────────────
  function init() {
    document.getElementById('tripTitle').addEventListener('input', e => {
      state.title = e.target.value;
      scheduleSave();
      updateMeta();
    });

    const desc = document.getElementById('tripDescription');
    desc.addEventListener('input', e => {
      state.description = e.target.value;
      autoResize(desc);
      scheduleSave();
    });

    // Belt-and-braces: re-size once all resources (fonts incl.) are loaded
    window.addEventListener('load', () => resizeDesc());

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    });

    window.addEventListener('beforeunload', e => {
      if (dirty || saving) { e.preventDefault(); e.returnValue = ''; }
    });

    io = new IntersectionObserver(entries => {
      entries.forEach(en => { if (en.isIntersecting) en.target.classList.add('visible'); });
    }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

    load();
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

  function autoResize(el) {
    if (!el) return;
    el.style.height = '0';
    el.style.height = el.scrollHeight + 'px';
  }

  // Resize the trip description textarea — run multiple times to handle
  // the case where fonts haven't loaded yet and scrollHeight is wrong.
  function resizeDesc() {
    const desc = document.getElementById('tripDescription');
    if (!desc) return;
    autoResize(desc);
    requestAnimationFrame(() => autoResize(desc));
    if (document.fonts?.ready) document.fonts.ready.then(() => autoResize(desc));
    setTimeout(() => autoResize(desc), 300);
  }

  const ICON_COPY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h3"/></svg>';
  const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>';

  // Copy button — always rendered; CSS hides it when the sibling input is empty
  function copyBtn() {
    return `<button type="button" class="inp-copy" title="Copy" onclick="doCopy(this)">${ICON_COPY}</button>`;
  }

  async function doCopy(btn) {
    const field = btn.parentElement?.querySelector('.inp');
    const text  = field?.value || '';
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
    }
    btn.classList.add('copied');
    btn.innerHTML = ICON_CHECK;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = ICON_COPY; }, 1200);
    toast('Copied', 'ok');
  }

  function blankCard(type, date = '') {
    const base = { id: uid(), type, date, status: 'idea', notes: '' };
    if (type === 'activity')  return { ...base, location: '', activity: '' };
    if (type === 'transport') return { ...base, mode: 'flight', from: '', to: '', departTime: '', arriveTime: '', confirmation: '', confirmation2: '' };
    if (type === 'hotel')     return { ...base, name: '', address: '', checkInDate: '', checkInTime: '', checkOutDate: '', checkOutTime: '', confirmation: '' };
    return base;
  }

  // ── Migration from older shapes ──────────────────────────────
  function migrate(data) {
    // Already new format
    if (data && Array.isArray(data.cards)) {
      return {
        title:       data.title       || 'Our Trip',
        description: data.description || '',
        startDate:   data.startDate   || '',
        endDate:     data.endDate     || '',
        cards:       data.cards.map(normalizeCard),
      };
    }
    // Old format: { items: [{...}] } or just [{...}]
    const items = Array.isArray(data) ? data : (data?.items || []);
    const cards = items.flatMap(old => {
      // Legacy transport entry
      if (old.type === 'transport') {
        return [normalizeCard({
          id: old.id, type: 'transport', date: old.date, status: old.status,
          mode: old.mode, from: old.from, to: old.to,
          departTime: old.departTime, arriveTime: old.arriveTime,
          confirmation: old.confirmation, notes: old.notes,
        })];
      }
      // Legacy day entry (possibly with hasTransport)
      const out = [];
      out.push(normalizeCard({
        id: old.id, type: 'activity', date: old.date, status: old.status,
        location: old.city, time: old.time, activity: old.activity, notes: old.notes,
      }));
      if (old.hasTransport) {
        out.push(normalizeCard({
          id: uid(), type: 'transport', date: old.date, status: old.status,
          mode: old.mode, from: old.from, to: old.to,
          departTime: old.departTime, arriveTime: old.arriveTime,
          confirmation: old.confirmation, notes: '',
        }));
      }
      return out;
    });
    const dates = cards.map(c => c.date).filter(Boolean).sort();
    return {
      title:       data?.title       || 'Our Trip',
      description: data?.description || '',
      startDate:   dates[0] || '',
      endDate:     dates[dates.length - 1] || '',
      cards,
    };
  }

  function normalizeCard(c) {
    const base = {
      id:     c.id || uid(),
      type:   c.type || 'activity',
      date:   c.date || '',
      status: c.status || 'idea',
      notes:  c.notes  || '',
    };
    if (base.type === 'activity') {
      const out = { ...base, location: c.location || '', activity: c.activity || '' };
      if (c.time !== undefined && c.time !== null) out.time = c.time;
      return out;
    }
    if (base.type === 'transport') return {
      ...base,
      mode: c.mode || 'flight',
      from: c.from || '', to: c.to || '',
      departTime: c.departTime || '', arriveTime: c.arriveTime || '',
      confirmation:  c.confirmation  || '',
      confirmation2: c.confirmation2 || '',
    };
    if (base.type === 'hotel') return {
      ...base,
      name: c.name || '', address: c.address || '',
      checkInDate:  c.checkInDate  || '',
      checkInTime:  c.checkInTime  || '',
      checkOutDate: c.checkOutDate || '',
      checkOutTime: c.checkOutTime || '',
      confirmation: c.confirmation || '',
    };
    return base;
  }

  // ── Local fallback ───────────────────────────────────────────
  function saveLocal() { localStorage.setItem(LS, JSON.stringify(state)); }
  function loadLocal() {
    try {
      const s = localStorage.getItem(LS);
      state = migrate(s ? JSON.parse(s) : {});
    } catch { state = migrate({}); }
    render();
  }

  // ── Loader overlay ───────────────────────────────────────────
  function hideLoader() {
    document.getElementById('loader').classList.add('hidden');
    document.body.classList.remove('loading');
  }

  // ── Remote (Firebase Realtime Database) ──────────────────────
  async function load() {
    setState('saving'); setStatusText('↓ loading…');
    const slowHint = setTimeout(() => {
      document.getElementById('loaderSub')?.classList.add('show');
    }, LOAD_SLOW_HINT_MS);

    try {
      const res  = await fetch(REMOTE_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      state = migrate(data || {});
      history = [];
      document.getElementById('undoBtn').disabled = true;
      dirty = false;
      render();
      setState('idle');
    } catch (e) {
      console.error(e);
      loadLocal();
      setState('err');
      toast('Could not reach server — showing local data', 'bad');
    } finally {
      clearTimeout(slowHint);
      hideLoader();
    }
  }

  function scheduleSave() {
    dirty = true;
    setState('dirty');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(doSave, SAVE_DEBOUNCE_MS);
  }

  async function doSave() {
    clearTimeout(saveTimer);
    if (saving) return;
    if (!dirty) { setState('saved'); return; }
    saving = true; dirty = false;
    const snapshot = JSON.stringify(state);
    setState('saving');
    try {
      const res = await fetch(REMOTE_URL, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    snapshot,
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      await res.json();
      saving = false;
      if (dirty) scheduleSave();
      else {
        setState('saved');
        flashSaveConfirm();
        setTimeout(() => { if (!dirty && !saving) setState('idle'); }, 3000);
      }
    } catch (e) {
      console.error('save failed:', e);
      saving = false; dirty = true;
      setState('err');
      saveTimer = setTimeout(doSave, SAVE_DEBOUNCE_MS);
      toast('Save failed — will retry', 'bad');
    }
  }

  function saveToSheets() { dirty = true; clearTimeout(saveTimer); doSave(); }

  function setState(s) {
    setStatusClass(s);
    setStatusText(stateLabel(s));
    updateUnsavedStrip(s);
    updateTitle();
  }
  function updateUnsavedStrip(s) {
    const el   = document.getElementById('unsavedStrip');
    const text = el?.querySelector('.unsaved-text');
    if (!el) return;
    el.classList.remove('show', 'err');
    document.body.classList.toggle('is-dirty', s === 'dirty' || s === 'saving' || s === 'err');
    if (s === 'dirty')  { el.classList.add('show'); text.textContent = 'Unsaved changes'; }
    else if (s === 'saving') { el.classList.add('show'); text.textContent = 'Saving…'; }
    else if (s === 'err')    { el.classList.add('show', 'err'); text.textContent = 'Save failed — will retry'; }
  }
  function updateTitle() {
    const base = state.title || 'Our Trip';
    document.title = (dirty || saving) ? `• ${base}` : base;
  }
  function flashSaveConfirm() {
    const el = document.getElementById('saveConfirm');
    if (!el) return;
    el.classList.remove('on');
    void el.offsetWidth;   // restart animation
    el.classList.add('on');
  }
  function stateLabel(s) {
    return s === 'idle' ? '' : s === 'dirty' ? '· unsaved' :
           s === 'saving' ? '↑ saving…' : s === 'saved' ? '✓ saved' :
           s === 'err' ? '⚠ retrying' : '';
  }
  function setStatusClass(s) {
    const el = document.getElementById('statusDot');
    el.className = 'status' + (s === 'idle' ? '' :
                               s === 'dirty' || s === 'saving' ? ' saving' :
                               s === 'saved' ? ' saved' :
                               s === 'err' ? ' err' : '');
  }
  function setStatusText(t) { document.getElementById('statusDot').textContent = t; }

  // ── Date helpers ─────────────────────────────────────────────
  function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s + 'T12:00:00');
    const day   = d.getDate();
    const month = d.toLocaleDateString('en-US', { month: 'long' });
    return `${day}/${month}/${d.getFullYear()}`;
  }
  function fmtWeekday(s) {
    if (!s) return '';
    return new Date(s + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long' });
  }
  function daysBetween(a, b) {
    if (!a || !b) return [];
    const start = new Date(a + 'T12:00:00');
    const end   = new Date(b + 'T12:00:00');
    if (end < start) return [];
    const out = [];
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      out.push(d.toISOString().slice(0, 10));
    }
    return out;
  }

  function openDate(btn) {
    const input = btn.nextElementSibling;
    if (input && typeof input.showPicker === 'function') {
      try { input.showPicker(); return; } catch {}
    }
    if (input) { input.focus(); input.click(); }
  }

  function setRange(field, value) {
    pushHistory();
    state[field] = value;
    if (state.startDate && state.endDate && state.startDate > state.endDate) {
      if (field === 'startDate') state.endDate = value;
      else state.startDate = value;
    }
    render(); scheduleSave();
  }

  // ── Render ───────────────────────────────────────────────────
  function render() {
    document.getElementById('tripTitle').value = state.title;
    const desc = document.getElementById('tripDescription');
    desc.value = state.description || '';
    resizeDesc();
    renderRangePickers();
    updateMeta();

    const wrap = document.getElementById('days');
    wrap.innerHTML = '';

    const dates = daysBetween(state.startDate, state.endDate);
    if (!dates.length) {
      wrap.innerHTML = `<div class="empty">Pick a start and end date to build your chronology.</div>`;
      saveLocal();
      return;
    }

    dates.forEach((date, idx) => {
      wrap.appendChild(renderDayBlock(date, idx + 1));
    });

    // Unscheduled cards (outside range)
    const inRange = new Set(dates);
    const outside = state.cards.filter(c => !c.date || !inRange.has(c.date));
    if (outside.length) {
      wrap.appendChild(renderUnscheduled(outside));
    }

    document.querySelectorAll('.day-block').forEach(el => io.observe(el));
    initSortables();
    saveLocal();
  }

  function renderRangePickers() {
    const startBtn   = document.getElementById('startBtn');
    const endBtn     = document.getElementById('endBtn');
    const startInput = document.getElementById('startInput');
    const endInput   = document.getElementById('endInput');
    startInput.value = state.startDate || '';
    endInput.value   = state.endDate   || '';
    startBtn.textContent = state.startDate ? fmtDate(state.startDate) : 'Set start';
    endBtn.textContent   = state.endDate   ? fmtDate(state.endDate)   : 'Set end';
    startBtn.classList.toggle('empty', !state.startDate);
    endBtn.classList.toggle('empty',   !state.endDate);
  }

  function updateMeta() {
    const meta = document.getElementById('tripMeta');
    const dates = daysBetween(state.startDate, state.endDate);
    const n = state.cards.length;
    const entries = n ? `${n} entr${n !== 1 ? 'ies' : 'y'}` : '0 entries';
    if (dates.length) {
      meta.textContent = `${dates.length} day${dates.length !== 1 ? 's' : ''} · ${entries}`;
    } else {
      meta.textContent = entries;
    }
  }

  function renderDayBlock(date, dayNum) {
    const el = document.createElement('section');
    el.className = 'day-block';
    el.dataset.date = date;

    const dayCards = state.cards.filter(c => c.date === date);

    el.innerHTML = `
      <span class="day-dot"></span>
      <div class="day-header">
        <div class="day-header-main">
          <span class="day-num">Day ${dayNum}</span>
          <h3 class="day-title">
            <span class="day-weekday">${fmtWeekday(date)}</span>
            ${fmtDate(date)}
          </h3>
        </div>
        <span class="day-count">${dayCards.length} entr${dayCards.length === 1 ? 'y' : 'ies'}</span>
      </div>

      <div class="day-cards"></div>

      <div class="day-adds-label">Add</div>
      <div class="day-adds">
        <button class="day-add activity"  onclick="addCard('activity','${date}')">
          <span class="add-ico">☀️</span><span>Activity</span>
        </button>
        <button class="day-add transport" onclick="addCard('transport','${date}')">
          <span class="add-ico">✈️</span><span>Transport</span>
        </button>
        <button class="day-add hotel"     onclick="addCard('hotel','${date}')">
          <span class="add-ico">🏨</span><span>Hotel</span>
        </button>
      </div>`;

    const cardsEl = el.querySelector('.day-cards');
    dayCards.forEach(c => cardsEl.appendChild(renderCard(c)));
    return el;
  }

  function renderUnscheduled(cards) {
    const el = document.createElement('section');
    el.className = 'unscheduled day-block';
    el.dataset.date = '';
    el.innerHTML = `
      <div class="unscheduled-title">Unscheduled · outside trip range</div>
      <div class="day-cards" style="padding-left:0;"></div>`;
    const list = el.querySelector('.day-cards');
    cards.forEach(c => list.appendChild(renderCard(c)));
    return el;
  }

  // ── Drag & drop ──────────────────────────────────────────────
  function initSortables() {
    document.querySelectorAll('.day-cards').forEach(el => {
      new Sortable(el, {
        group: 'cards',
        animation: 180,
        handle: '.drag-handle',
        ghostClass:  'card-ghost',
        chosenClass: 'card-chosen',
        dragClass:   'card-drag',
        onEnd: handleDragEnd,
      });
    });
  }

  function handleDragEnd(evt) {
    // No actual move
    if (evt.from === evt.to && evt.oldIndex === evt.newIndex) return;

    // Snapshot BEFORE applying the change so Undo can restore it
    pushHistory();

    // Rebuild state.cards from the current DOM order across all day-blocks
    const newCards = [];
    document.querySelectorAll('.day-block').forEach(block => {
      const date = block.dataset.date || '';
      block.querySelectorAll('.day-cards .card').forEach(cardEl => {
        const id = cardEl.dataset.cardId;
        const existing = state.cards.find(c => c.id === id);
        if (existing) newCards.push({ ...existing, date });
      });
    });
    state.cards = newCards;

    updateMeta();
    saveLocal();
    scheduleSave();
  }

  function renderCard(c) {
    const el = document.createElement('article');
    el.className = `card type-${c.type}`;
    el.dataset.cardId = c.id;

    const head = `
      <header class="card-head">
        <span class="drag-handle" title="Drag to reorder or move to another day">⋮⋮</span>
        <span class="type-pill">${TYPES[c.type].icon} ${TYPES[c.type].label}</span>
        ${c.type === 'transport' ? `
          <select class="mode-sel" onchange="upd('${c.id}','mode',this.value); render()">
            ${Object.entries(MODES).map(([k,v]) =>
              `<option value="${k}" ${c.mode===k?'selected':''}>${v.icon}  ${v.label}</option>`
            ).join('')}
          </select>
        ` : ''}
        <div class="head-right">
          <select class="badge badge-${c.status}" onchange="updStatus('${c.id}',this)">
            ${statusOptions(c.status)}
          </select>
          <button class="btn btn-tiny danger" title="Remove" onclick="removeCard('${c.id}')">✕</button>
        </div>
      </header>`;

    const body = c.type === 'activity'  ? activityBody(c)
               : c.type === 'transport' ? transportBody(c)
               : hotelBody(c);

    el.innerHTML = head + body;
    return el;
  }

  function activityBody(c) {
    return `
      <div class="card-body">
        <div class="field">
          <label class="label">Location</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.location)}"
                   placeholder="e.g. Paris"
                   onchange="upd('${c.id}','location',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        ${c.time === undefined || c.time === null ? `
          <div class="field">
            <button class="inline-add-btn" onclick="addField('${c.id}','time','')">＋ Add time</button>
          </div>
        ` : `
          <div class="field">
            <label class="label">Time</label>
            <div class="inp-row">
              <input class="inp" type="time" value="${x(c.time)}"
                     onchange="upd('${c.id}','time',this.value)" />
              <button class="inp-clear" title="Remove time" onclick="deleteField('${c.id}','time')">×</button>
            </div>
          </div>
        `}
        <div class="field span2">
          <label class="label">Activity</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.activity)}"
                   placeholder="What are you doing?"
                   onchange="upd('${c.id}','activity',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        <div class="field span2">
          <label class="label">Notes</label>
          <div class="ta-wrap">
            <textarea class="inp" rows="2"
                      placeholder="Links, reservations, things to remember…"
                      onchange="upd('${c.id}','notes',this.value)">${x(c.notes)}</textarea>
            ${copyBtn()}
          </div>
        </div>
      </div>`;
  }

  function transportBody(c) {
    return `
      <div class="card-body">
        <div class="field">
          <label class="label">From</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.from)}"
                   placeholder="e.g. Montevideo (MVD)"
                   onchange="upd('${c.id}','from',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        <div class="field">
          <label class="label">To</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.to)}"
                   placeholder="e.g. Paris (CDG)"
                   onchange="upd('${c.id}','to',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        <div class="field">
          <label class="label">Departure</label>
          <input class="inp" type="time" value="${x(c.departTime)}"
                 onchange="upd('${c.id}','departTime',this.value)" />
        </div>
        <div class="field">
          <label class="label">Arrival</label>
          <input class="inp" type="time" value="${x(c.arriveTime)}"
                 onchange="upd('${c.id}','arriveTime',this.value)" />
        </div>
        <div class="field">
          <label class="label">Reference / confirmation</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.confirmation)}"
                   placeholder="Your booking code"
                   onchange="upd('${c.id}','confirmation',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        <div class="field">
          <label class="label">Reference / confirmation (partner)</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.confirmation2)}"
                   placeholder="Partner's booking code"
                   onchange="upd('${c.id}','confirmation2',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        <div class="field span2">
          <label class="label">Notes</label>
          <div class="ta-wrap">
            <textarea class="inp" rows="2"
                      placeholder="Seat, terminal, baggage, links…"
                      onchange="upd('${c.id}','notes',this.value)">${x(c.notes)}</textarea>
            ${copyBtn()}
          </div>
        </div>
      </div>`;
  }

  function hotelBody(c) {
    return `
      <div class="card-body">
        <div class="field span2">
          <label class="label">Hotel name</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.name)}"
                   placeholder="e.g. Hotel Eiffel"
                   onchange="upd('${c.id}','name',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        <div class="field">
          <label class="label">Check-in date</label>
          <span class="date-wrap" style="display:block">
            <button type="button" class="inp-date-btn ${c.checkInDate ? '' : 'empty'}"
                    onclick="openDate(this)">
              ${c.checkInDate ? fmtDate(c.checkInDate) : 'Pick date'}
            </button>
            <input class="head-date-hidden" type="date" value="${x(c.checkInDate)}"
                   onchange="upd('${c.id}','checkInDate',this.value); render()" />
          </span>
        </div>
        <div class="field">
          <label class="label">Check-in time</label>
          <input class="inp" type="time" value="${x(c.checkInTime)}"
                 onchange="upd('${c.id}','checkInTime',this.value)" />
        </div>
        <div class="field">
          <label class="label">Check-out date</label>
          <span class="date-wrap" style="display:block">
            <button type="button" class="inp-date-btn ${c.checkOutDate ? '' : 'empty'}"
                    onclick="openDate(this)">
              ${c.checkOutDate ? fmtDate(c.checkOutDate) : 'Pick date'}
            </button>
            <input class="head-date-hidden" type="date" value="${x(c.checkOutDate)}"
                   onchange="upd('${c.id}','checkOutDate',this.value); render()" />
          </span>
        </div>
        <div class="field">
          <label class="label">Check-out time</label>
          <input class="inp" type="time" value="${x(c.checkOutTime)}"
                 onchange="upd('${c.id}','checkOutTime',this.value)" />
        </div>
        <div class="field span2">
          <label class="label">Address</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.address)}"
                   placeholder="e.g. 5 Av. Anatole France, Paris"
                   onchange="upd('${c.id}','address',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        <div class="field span2">
          <label class="label">Confirmation</label>
          <div class="inp-row">
            <input class="inp" type="text" value="${x(c.confirmation)}"
                   placeholder="e.g. Booking.com · ABC123"
                   onchange="upd('${c.id}','confirmation',this.value)" />
            ${copyBtn()}
          </div>
        </div>
        <div class="field span2">
          <label class="label">Notes</label>
          <div class="ta-wrap">
            <textarea class="inp" rows="2"
                      placeholder="Room preferences, breakfast, Wi-Fi…"
                      onchange="upd('${c.id}','notes',this.value)">${x(c.notes)}</textarea>
            ${copyBtn()}
          </div>
        </div>
      </div>`;
  }

  function statusOptions(current) {
    return ['idea','tentative','booked'].map(s => {
      const label = s === 'booked' ? 'Booked ✓' : s[0].toUpperCase() + s.slice(1);
      return `<option value="${s}" ${current===s?'selected':''}>${label}</option>`;
    }).join('');
  }

  function x(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── History / Undo ───────────────────────────────────────────
  function pushHistory() {
    history.push(JSON.stringify(state));
    if (history.length > 50) history.shift();
    document.getElementById('undoBtn').disabled = false;
  }
  function undo() {
    if (!history.length) return;
    state = JSON.parse(history.pop());
    document.getElementById('undoBtn').disabled = history.length === 0;
    render(); scheduleSave();
    toast('Undone', '');
  }

  // ── Data ops ─────────────────────────────────────────────────
  function upd(id, field, val) {
    pushHistory();
    state.cards = state.cards.map(c => c.id === id ? { ...c, [field]: val } : c);
    updateMeta(); saveLocal(); scheduleSave();
  }
  function deleteField(id, field) {
    pushHistory();
    state.cards = state.cards.map(c => {
      if (c.id !== id) return c;
      const copy = { ...c }; delete copy[field]; return copy;
    });
    render(); scheduleSave();
  }
  function addField(id, field, initial = '') {
    pushHistory();
    state.cards = state.cards.map(c => c.id === id ? { ...c, [field]: initial } : c);
    render(); scheduleSave();
  }
  function updStatus(id, sel) {
    sel.className = `badge badge-${sel.value}`;
    upd(id, 'status', sel.value);
  }
  function addCard(type, date) {
    pushHistory();
    state.cards.push(blankCard(type, date));
    render(); scheduleSave();
    // Scroll the new card into view
    requestAnimationFrame(() => {
      const cards = document.querySelectorAll(`.day-block`);
      // find block matching the date
      // Simpler: find the last card in the day block whose header contains this date
      const all = document.querySelectorAll('.day-block .card');
      if (all.length) all[all.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  }
  function removeCard(id) {
    pushHistory();
    state.cards = state.cards.filter(c => c.id !== id);
    render(); scheduleSave();
  }

  // ── Toast ─────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, cls = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast on' + (cls ? ' ' + cls : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
  }

  init();
</script>
</body>
</html>
